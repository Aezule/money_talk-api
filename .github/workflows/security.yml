name: Security


on:
  workflow_call:

permissions:
  contents: read

jobs:
  dependencies:
    name: Dépendances (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Rapport complet (non bloquant)
        run: npm audit || true
      - name: Gate — échec si vulnérabilité CRITICAL en production
        run: npm audit --omit=dev --audit-level=critical

  secrets:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks (détection de secrets)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --verbose

  image:
    name: Image Docker (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de l'image
        run: docker build -t money-talks-api:ci .
      - name: Rapport Trivy (HIGH+CRITICAL, non bloquant)
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock ghcr.io/aquasecurity/trivy:latest image --severity HIGH,CRITICAL --format table money-talks-api:ci || true
      - name: Gate Trivy — échec sur CVE CRITICAL corrigeable
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock ghcr.io/aquasecurity/trivy:latest image --severity CRITICAL --ignore-unfixed --format table money-talks-api:ci
