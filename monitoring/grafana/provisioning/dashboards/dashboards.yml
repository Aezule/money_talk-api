apiVersion: 1

# Charge automatiquement les dashboards JSON déposés dans /var/lib/grafana/dashboards.
providers:
  - name: money-talks
    orgId: 1
    folder: Money Talks
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
